<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria GitHub</title>
    <meta name="description" content="Galeria de perfis do GitHub dos membros do Servidor dos Programadores.">

    <meta property="og:title" content="Galeria GitHub">
    <meta property="og:description" content="Galeria de perfis do GitHub dos membros do Servidor dos Programadores.">
    <meta property="og:image" content="https://galeria.servidordosprogramadores.com/banner.png">
    <meta property="og:url" content="https://galeria.servidordosprogramadores.com">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Galeria GitHub">
    <meta name="twitter:description" content="Galeria de perfis do GitHub dos membros do Servidor dos Programadores.">
    <meta name="twitter:image" content="https://galeria.servidordosprogramadores.com/banner.png">

    <link rel="icon" href="icon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">GALERIA <span class="blue">GITHUB</span></div>
        <p class="tagline"><a href="https://discord.gg/programador" target="_blank" rel="noopener noreferrer">Servidor
                dos Programadores</a></p>
        <div class="header-links">
            <a href="about.html" class="about-link">sobre</a>
            <a href="https://discord.com/channels/1112920281367973900/1520551692570202192" class="about-link"
                target="_blank" rel="noopener noreferrer">cadastre-se</a>
        </div>
    </header>

    <div class="count-bar">
        <b id="count">—</b> devs cadastrados
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="search-wrap">
                <span class="search-prefix">&gt;</span>
                <input type="text" id="search" placeholder="Buscar por nome, bio, Discord..." />
            </div>
            <div class="select-wrap">
                <select id="sort">
                    <option value="followers">// seguidores</option>
                    <option value="repos">// repos</option>
                    <option value="name">// nome (a-z)</option>
                    <option value="desde">// mais antigos</option>
                </select>
                <span class="select-arrow">▾</span>
            </div>
        </div>

        <div class="gallery" id="gallery">
            <div class="state state-loading">carregando devs<span class="blink">_</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
